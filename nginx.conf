server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml;

    # ── Security Headers ──────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"              always;
    add_header X-XSS-Protection       "1; mode=block"        always;
    add_header Referrer-Policy        "strict-origin"        always;

    # ── Static Asset Caching (Vite generates hashed filenames) ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # ── Health Check (used by ECS + Docker HEALTHCHECK) ──────────
    location = /health {
        access_log  off;
        return      200 '{"status":"ok","service":"shopsphere"}';
        add_header  Content-Type application/json;
    }

    # ── Block dotfiles ────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log    off;
        log_not_found off;
    }

    # ── SPA Fallback — all routes served by index.html ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
