name: ShopSphere Deploy to Amazon ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION:      ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY:  ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER:     ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE:     ${{ secrets.ECS_SERVICE }}
  CONTAINER_NAME:  ${{ secrets.CONTAINER_NAME }}

jobs:
  deploy:
    name: Build, Push ECR, Deploy ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "::notice title=Image Tags::latest + ${SHORT_SHA}"

      - name: Build Docker image
        env:
          REGISTRY:  ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tags.outputs.short_sha }}
        run: |
          echo "Building image: $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build \
            --file Dockerfile \
            --tag  $REGISTRY/$ECR_REPOSITORY:latest \
            --tag  $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.repositoryUrl }}" \
            .

      - name: Push image to Amazon ECR
        env:
          REGISTRY:  ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tags.outputs.short_sha }}
        run: |
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "Pushed: $REGISTRY/$ECR_REPOSITORY:latest"
          echo "Pushed: $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Verify ECR image exists
        env:
          IMAGE_TAG: ${{ steps.tags.outputs.short_sha }}
        run: |
          aws ecr describe-images \
            --repository-name $ECR_REPOSITORY \
            --image-ids imageTag=$IMAGE_TAG \
            --region $AWS_REGION \
            --query 'imageDetails[0].{digest:imageDigest,pushed:imagePushedAt,size:imageSizeInBytes}' \
            --output table

      - name: Render ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ secrets.ECS_TASK_DEFINITION }}
          container-name:  ${{ secrets.CONTAINER_NAME }}
          image:           ${{ steps.tags.outputs.image_uri }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.render-task-def.outputs.task-definition }}
          service:                  ${{ secrets.ECS_SERVICE }}
          cluster:                  ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes:         15

      - name: Verify ECS deployment
        run: |
          STATE=$(aws ecs describe-services \
            --cluster  $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query    'services[0].deployments[0].rolloutState' \
            --output   text)

          RUNNING=$(aws ecs describe-services \
            --cluster  $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query    'services[0].runningCount' \
            --output   text)

          echo ""
          echo "Deployment Complete"
          echo "Cluster: $ECS_CLUSTER"
          echo "Service: $ECS_SERVICE"
          echo "Image: ${{ steps.tags.outputs.image_uri }}"
          echo "Rollout: $STATE"
          echo "Running: $RUNNING task(s)"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo ""
          echo "CloudWatch Logs:"
          echo "https://console.aws.amazon.com/cloudwatch/home?region=${AWS_REGION}#logsV2:log-groups/log-group/%2Fecs%2Fshopsphere"
          echo ""

          if [ "$STATE" != "COMPLETED" ]; then
            echo "Warning: Rollout state is '$STATE' - tasks may still be stabilising."
          else
            echo "Deployment fully COMPLETED. App is live."
          fi
