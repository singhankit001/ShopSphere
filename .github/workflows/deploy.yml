name: Deploy to Amazon ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AWS_REGION:      ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY:  ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER:     ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE:     ${{ secrets.ECS_SERVICE }}
  CONTAINER_NAME:  ${{ secrets.CONTAINER_NAME }}

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        env:
          REGISTRY:  ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tags.outputs.short_sha }}
        run: |
          docker build \
            --file Dockerfile \
            --tag  $REGISTRY/$ECR_REPOSITORY:latest \
            --tag  $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --label "revision=${{ github.sha }}" \
            .

      - name: Push image to Amazon ECR
        env:
          REGISTRY:  ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tags.outputs.short_sha }}
        run: |
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Render ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ secrets.ECS_TASK_DEFINITION }}
          container-name:  ${{ secrets.CONTAINER_NAME }}
          image:           ${{ steps.tags.outputs.image_uri }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.render-task-def.outputs.task-definition }}
          service:                  ${{ secrets.ECS_SERVICE }}
          cluster:                  ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes:         15

      - name: Verify ECS deployment
        run: |
          STATE=$(aws ecs describe-services \
            --cluster  $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query    'services[0].deployments[0].rolloutState' \
            --output   text)

          if [ "$STATE" != "COMPLETED" ]; then
            echo "Deployment state is '$STATE' - tasks may still be stabilising."
            exit 1
          else
            echo "Deployment fully COMPLETED. App is live."
          fi
