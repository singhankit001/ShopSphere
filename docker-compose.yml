version: "3.9"

services:
  # ─── Frontend (React + Nginx) ───────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: shopsphere-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shopsphere-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Backend (Express + Node) ───────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: shopsphere-backend
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_URL=http://localhost
    env_file:
      - ./server/.env
    networks:
      - shopsphere-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  shopsphere-net:
    driver: bridge
